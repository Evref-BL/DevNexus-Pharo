name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish.yml
      - package.json
      - package-lock.json
  workflow_dispatch:
    inputs:
      dist_tag:
        description: npm dist-tag to publish under
        required: true
        default: latest
        type: choice
        options:
          - latest
          - alpha

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Set up npm for trusted publishing
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check package version is not published
        id: version
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version --json > /tmp/npm-version.json 2>/dev/null; then
            echo "::notice::${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published; skipping publish"
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.version.outputs.published != 'true'
        run: npm ci

      - name: Run checks
        if: steps.version.outputs.published != 'true'
        run: npm run check

      - name: Verify package contents
        if: steps.version.outputs.published != 'true'
        run: npm pack --dry-run

      - name: Publish to npm
        if: steps.version.outputs.published != 'true'
        env:
          NPM_DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.dist_tag || 'latest' }}
        run: npm publish --access public --tag "$NPM_DIST_TAG"

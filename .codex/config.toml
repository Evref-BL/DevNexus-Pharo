# DevNexus-Pharo exposes this supervised HTTP MCP endpoint after `dev-nexus-pharo start`.

[mcp_servers.dev_nexus_pharo]
type = "http"
enabled = true
required = true
url = "http://127.0.0.1:7330/mcp"

[mcp_servers.plexus]
type = "http"
enabled = true
url = "http://127.0.0.1:7331/mcp"

[mcp_servers.vibe_kanban]
enabled = true
command = "cmd"
args = ["/c", "npx", "-y", "vibe-kanban@0.1.43", "--mcp"]
default_tools_approval_mode = "approve"
